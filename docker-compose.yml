version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sales_postgres
    environment:
      POSTGRES_DB: sales_intelligence
      POSTGRES_USER: sales_user
      POSTGRES_PASSWORD: sales_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sales_platform_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales_user -d sales_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus_etcd
    environment:
      - ETCD_AUTO_COMPACT_RETENTION=0.5
    command: etcd --advertise-client-urls=http://127.0.0.1:2379 --listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - sales_platform_network
    ports:
      - "2379:2379"

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /data
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - sales_platform_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: milvus_standalone
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - sales_platform_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sales_api
    environment:
      - DATABASE_URL=postgresql+asyncpg://sales_user:sales_password@postgres:5432/sales_intelligence
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - JWT_SECRET
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - OPENAI_API_KEY
      - GEMINI_API_KEY
      - LLM_PROVIDER
      - AGENT_ROUTER_API_KEY
      - AGENT_ROUTER_BASE_URL
      - AGENT_ROUTER_MODEL
      - LANGCHAIN_TRACING_V2
      - LANGCHAIN_ENDPOINT
      - LANGCHAIN_API_KEY
      - LANGCHAIN_PROJECT
      - WHATSAPP_VERIFY_TOKEN
      - WHATSAPP_ACCESS_TOKEN
      - WHATSAPP_PHONE_NUMBER_ID
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - sales_platform_network

networks:
  sales_platform_network:
    name: sales_platform_network

volumes:
  postgres_data:
  milvus_data:
  etcd_data:
  minio_data:
